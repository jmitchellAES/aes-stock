<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AES Inventory App</title>

<!-- ✅ CORRECT, WORKING MSAL SCRIPT -->
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 40px;
}
button {
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}
#app {
  display: none;
  margin-top: 20px;
  background: #ffffff;
  padding: 20px;
  border-radius: 6px;
}
.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>AES Inventory System</h2>

<button id="loginBtn">Sign in with Microsoft</button>
<div id="error" class="error"></div>

<div id="app">
  <h3>✅ Login Successful</h3>
  <p id="userEmail"></p>
</div>

<script>
/* =====================================================
   MSAL CONFIG — SPA SAFE (NO SECRETS)
===================================================== */
const msalConfig = {
  auth: {
    clientId: "c7c97eaf-1e41-4339-93c5-555b6c8bf231",
    authority: "https://login.microsoftonline.com/1d0cc9c5-af28-42e4-b83c-677cb00c9dde",
    redirectUri: window.location.origin
  },
  cache: {
    cacheLocation: "localStorage",
    storeAuthStateInCookie: false
  }
};
``

/* =====================================================
   INIT MSAL
===================================================== */
const msalApp = new msal.PublicClientApplication(msalConfig);

/* =====================================================
   ALLOWED USERS
===================================================== */
const allowedUsers = [
  "jmitchell@allelectricsales.com",
  "jmarra@allelectricsales.com"
];

/* =====================================================
   LOGIN HANDLER
===================================================== */
document.getElementById("loginBtn").addEventListener("click", async () => {
  document.getElementById("error").innerText = "";

  try {
    const response = await msalApp.loginPopup({
      scopes: ["User.Read"]
    });

    const email = response.account.username.toLowerCase();

    if (!allowedUsers.includes(email)) {
      document.getElementById("error").innerText =
        "Access denied: unauthorized user.";
      await msalApp.logoutPopup();
      return;
    }

    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("userEmail").innerText =
      "Signed in as: " + email;

  } catch (err) {
    console.error(err);
    document.getElementById("error").innerText =
      "Microsoft sign‑in failed. See console for details.";
  }
});
</script>

</body>
</html>
