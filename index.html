<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AES Inventory System</title>

<!-- ✅ CORRECT MSAL SCRIPT (DO NOT CHANGE) -->
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 20px;
}
h2, h3 {
  margin-top: 0;
}
button {
  padding: 8px 14px;
  margin-right: 6px;
  cursor: pointer;
}
.hidden {
  display: none;
}
.card {
  background: #fff;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 6px;
}
nav {
  margin-top: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  border: 1px solid #ccc;
  padding: 6px;
}
.low {
  background: #fff3cd;
}
.critical {
  background: #f8d7da;
}
#error {
  color: red;
  margin-top: 10px;
}
.dropzone {
  border: 2px dashed #999;
  padding: 20px;
  text-align: center;
  background: #fafafa;
  margin-top: 10px;
}
input {
  width: 100%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
  <h2>AES Inventory System</h2>
  <button id="loginBtn">Sign in with Microsoft</button>
  <div id="error"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="card">
    <strong id="userEmail"></strong>
    <nav>
      <button onclick="showPage('stock')">Stock</button>
      <button onclick="showPage('receiving')">Receiving</button>
      <button onclick="showPage('sales')">Sales</button>
      <button onclick="showPage('physical')">Physical Count</button>
    </nav>
  </div>

  <!-- STOCK -->
  <div id="stock" class="card">
    <h3>Stock Dashboard</h3>
    <table id="stockTable"></table>
  </div>

  <!-- RECEIVING -->
  <div id="receiving" class="card hidden">
    <h3>Receiving</h3>
    <button onclick="addReceiving()">Add Receiving Entry</button>
    <table id="receivingTable"></table>
  </div>

  <!-- SALES -->
  <div id="sales" class="card hidden">
    <h3>Sales</h3>
    <div class="dropzone" id="pdfDrop">
      Drop signed sales ticket PDFs here (stub)
    </div>
    <button onclick="addSale()">Add Sale</button>
    <table id="salesTable"></table>
  </div>

  <!-- PHYSICAL COUNT -->
  <div id="physical" class="card hidden">
    <h3>Physical Count</h3>
    <button onclick="runPhysical()">Run Physical Count</button>
    <table id="varianceTable"></table>
  </div>

</div>

<script>
/* =====================================================
   AUTH — LOCKED TO WORKING GITHUB PAGES REDIRECT
===================================================== */
const msalApp = new msal.PublicClientApplication({
  auth: {
    clientId: "c7c97eaf-1e41-4339-93c5-555b6c8bf231",
    authority: "https://login.microsoftonline.com/1d0cc9c5-af28-42e4-b83c-677cb00c9dde",
    redirectUri: "https://jmitchellaes.github.io/aes-stock/"
  },
  cache: { cacheLocation: "localStorage" }
});

const allowedUsers = [
  "jmitchell@allelectricsales.com",
  "jmarra@allelectricsales.com"
];

document.getElementById("loginBtn").onclick = async () => {
  try {
    const res = await msalApp.loginPopup({ scopes: ["User.Read"] });
    const email = res.account.username.toLowerCase();

    if (!allowedUsers.includes(email)) {
      await msalApp.logoutPopup();
      throw new Error("Unauthorized");
    }

    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("userEmail").innerText =
      "Signed in as: " + email;

    renderAll();

  } catch (e) {
    console.error(e);
    document.getElementById("error").innerText =
      e.errorCode || e.message || "Login failed";
  }
};

/* =====================================================
   DATA (IN‑MEMORY FOR NOW)
===================================================== */
const fixtures = [
  { id: "FP4", part: "DTF4UZDSW3CCT", reorder: 50 },
  { id: "GPS-8", part: "GPS8UZDSW4CCT", reorder: 25 }
];

const receiving = [];
const sales = [];

/* =====================================================
   CORE STOCK MATH
===================================================== */
function stockFor(id) {
  const r = receiving.filter(x => x.fixture === id)
                     .reduce((s,x)=>s+x.qty,0);
  const s = sales.filter(x => x.fixture === id)
                 .reduce((s,x)=>s+x.qty,0);
  return r - s;
}

/* =====================================================
   RENDERING
===================================================== */
function renderStock() {
  const t = document.getElementById("stockTable");
  t.innerHTML = `<tr><th>Fixture</th><th>Part</th><th>Qty</th><th>Reorder</th></tr>`;
  fixtures.forEach(f=>{
    const qty = stockFor(f.id);
    const cls = qty < f.reorder ? "critical" : "";
    t.innerHTML += `<tr class="${cls}">
      <td>${f.id}</td>
      <td>${f.part}</td>
      <td>${qty}</td>
      <td>${f.reorder}</td>
    </tr>`;
  });
}

function renderReceiving() {
  const t = document.getElementById("receivingTable");
  t.innerHTML = `<tr><th>Fixture</th><th>Qty</th></tr>`;
  receiving.forEach(r=>{
    t.innerHTML += `<tr><td>${r.fixture}</td><td>${r.qty}</td></tr>`;
  });
}

function renderSales() {
  const t = document.getElementById("salesTable");
  t.innerHTML = `<tr><th>Fixture</th><th>Qty</th></tr>`;
  sales.forEach(s=>{
    t.innerHTML += `<tr><td>${s.fixture}</td><td>${s.qty}</td></tr>`;
  });
}

function renderAll() {
  renderStock();
  renderReceiving();
  renderSales();
}

/* =====================================================
   ACTIONS
===================================================== */
function addReceiving() {
  const f = prompt("Fixture ID:");
  const q = Number(prompt("Qty received:"));
  if (!f || !q) return;
  receiving.push({ fixture: f, qty: q });
  renderAll();
}

function addSale() {
  const f = prompt("Fixture ID:");
  const q = Number(prompt("Qty sold:"));
  if (!f || !q) return;
  sales.push({ fixture: f, qty: q });
  renderAll();
}

function runPhysical() {
  const t = document.getElementById("varianceTable");
  t.innerHTML = `<tr><th>Fixture</th><th>System</th><th>Physical</th><th>Variance</th></tr>`;
  fixtures.forEach(f=>{
    const system = stockFor(f.id);
    const phys = Number(prompt(`Physical count for ${f.id}:`));
    if (phys !== system) {
      t.innerHTML += `<tr class="critical">
        <td>${f.id}</td>
        <td>${system}</td>
        <td>${phys}</td>
        <td>${phys - system}</td>
      </tr>`;
    }
  });
}

/* =====================================================
   NAV
===================================================== */
function showPage(id) {
  ["stock","receiving","sales","physical"].forEach(p =>
    document.getElementById(p).classList.add("hidden")
  );
  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
