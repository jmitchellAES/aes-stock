<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AES Inventory App</title>

<!-- ✅ MSAL (loaded ONCE) -->
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 40px;
}
button {
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}
#error {
  color: red;
  margin-top: 10px;
}
#app {
  display: none;
  margin-top: 20px;
  background: #ffffff;
  padding: 20px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>AES Inventory System</h2>

<button id="loginBtn">Sign in with Microsoft</button>
<div id="error"></div>

<div id="app">
  <h3>✅ Login Successful</h3>
  <p id="userEmail"></p>
</div>

<script>
/* =====================================================
   MSAL CONFIG — ONE FILE, ALL ENVIRONMENTS
===================================================== */
const msalConfig = {
  auth: {
    clientId: "c7c97eaf-1e41-4339-93c5-555b6c8bf231",
    authority: "https://login.microsoftonline.com/1d0cc9c5-af28-42e4-b83c-677cb00c9dde",
    redirectUri: "https://jmitchellaes.github.io/aes-stock/"
  },
  cache: {
    cacheLocation: "localStorage",
    storeAuthStateInCookie: false
  }
};

const msalApp = new msal.PublicClientApplication(msalConfig);

/* =====================================================
   ALLOWED USERS
===================================================== */
const allowedUsers = [
  "jmitchell@allelectricsales.com",
  "jmarra@allelectricsales.com"
];

/* =====================================================
   LOGIN HANDLER
===================================================== */
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("loginBtn");

  btn.addEventListener("click", async () => {
    document.getElementById("error").innerText = "";

    try {
      const response = await msalApp.loginPopup({
        scopes: ["User.Read"],
        prompt: "select_account"
      });

      const email = response.account.username.toLowerCase();

      if (!allowedUsers.includes(email)) {
        await msalApp.logoutPopup();
        throw new Error("Access denied for " + email);
      }

      btn.style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("userEmail").innerText =
        "Signed in as: " + email;

    } catch (err) {
      console.error("LOGIN ERROR:", err);
      document.getElementById("error").innerText =
        err.errorCode || err.message || "Login failed";
    }
  });
});
</script>

</body>
</html>
