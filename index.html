<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AES Inventory System</title>

<!-- MSAL -->
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>

<!-- SheetJS (Excel import) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:20px }
button { padding:6px 12px; margin-right:6px }
input, select { padding:4px }
.hidden { display:none }
.card { background:#fff; padding:16px; margin-bottom:16px; border-radius:6px }
table { width:100%; border-collapse:collapse; margin-top:10px }
th,td { border:1px solid #ccc; padding:6px; font-size:13px }
.critical { background:#f8d7da }
nav button { margin-bottom:6px }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
  <h2>AES Inventory System</h2>
  <button id="loginBtn">Sign in with Microsoft</button>
  <div id="error"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="card">
    <strong id="userEmail"></strong><br><br>
    <nav>
      <button onclick="showPage('stock')">Stock</button>
      <button onclick="showPage('receiving')">Receiving</button>
      <button onclick="showPage('sales')">Sales / Data</button>
      <button onclick="showPage('physical')">Physical Count</button>
      <button onclick="showPage('admin')">Admin</button>
    </nav>
  </div>

  <!-- STOCK -->
  <div id="stock" class="card"></div>

  <!-- RECEIVING -->
  <div id="receiving" class="card hidden"></div>

  <!-- SALES -->
  <div id="sales" class="card hidden"></div>

  <!-- PHYSICAL -->
  <div id="physical" class="card hidden"></div>

  <!-- ADMIN -->
  <div id="admin" class="card hidden">
    <h3>One‑Time SKU Import (Excel)</h3>
    <input type="file" accept=".xlsx,.xls" onchange="importExcel(this.files[0])">
    <p><b>Use once. After this, Excel is no longer required.</b></p>
  </div>

</div>

<script>
/* ================= AUTH ================= */
const msalApp = new msal.PublicClientApplication({
  auth:{
    clientId:"c7c97eaf-1e41-4339-93c5-555b6c8bf231",
    authority:"https://login.microsoftonline.com/1d0cc9c5-af28-42e4-b83c-677cb00c9dde",
    redirectUri:"https://jmitchellaes.github.io/aes-stock/"
  },
  cache:{cacheLocation:"localStorage"}
});

const allowedUsers=[
  "jmitchell@allelectricsales.com",
  "jmarra@allelectricsales.com"
];

loginBtn.onclick=async()=>{
  try{
    const r=await msalApp.loginPopup({scopes:["User.Read"]});
    if(!allowedUsers.includes(r.account.username.toLowerCase())) throw "Unauthorized";
    loginScreen.classList.add("hidden");
    app.classList.remove("hidden");
    userEmail.innerText=r.account.username;
    renderAll();
  }catch(e){ error.innerText=e; }
};

/* ================= DATA ================= */
let skus = JSON.parse(localStorage.getItem("skus")||"[]");
let receiving = JSON.parse(localStorage.getItem("receiving")||"[]");
let sales = JSON.parse(localStorage.getItem("sales")||"[]");

function save(){
  localStorage.setItem("skus",JSON.stringify(skus));
  localStorage.setItem("receiving",JSON.stringify(receiving));
  localStorage.setItem("sales",JSON.stringify(sales));
}

function stockFor(id){
  const base = skus.find(x=>x.id===id)?.qty||0;
  const r = receiving.filter(x=>x.id===id).reduce((s,x)=>s+x.qty,0);
  const s = sales.filter(x=>x.id===id).reduce((s,x)=>s+x.qty,0);
  return base+r-s;
}

/* ================= EXCEL IMPORT ================= */
function importExcel(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"binary"});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(sheet);
    skus = rows.map(r=>({
      id:r.ID,
      part:r.Part,
      desc:r.Description,
      qty:Number(r.Qty||0),
      reorder:Number(r.Reorder||0)
    }));
    save();
    alert("All SKUs imported. Excel no longer needed.");
    renderAll();
  };
  reader.readAsBinaryString(file);
}

/* ================= UI ================= */
function renderStock(){
  stock.innerHTML=`<h3>Stock</h3>
  <input placeholder="Search" oninput="renderStockFilter(this.value)">
  <div id="stockTable"></div>`;
  renderStockFilter("");
}

function renderStockFilter(f){
  const q=f.toLowerCase();
  stockTable.innerHTML=`<table>
  <tr><th>ID</th><th>Part</th><th>Description</th><th>Qty</th><th>Reorder</th></tr>
  ${skus.filter(s=>
    s.id.toLowerCase().includes(q)||
    s.part.toLowerCase().includes(q)||
    s.desc.toLowerCase().includes(q)
  ).map(s=>{
    const qty=stockFor(s.id);
    return `<tr class="${qty<s.reorder?'critical':''}">
      <td>${s.id}</td><td>${s.part}</td><td>${s.desc}</td>
      <td>${qty}</td><td>${s.reorder}</td></tr>`;
  }).join("")}
  </table>`;
}

function renderReceiving(){
  receivingDiv=`<h3>Receiving</h3>
  <select id="rSku">${skus.map(s=>`<option>${s.id}</option>`).join("")}</select>
  <input type="number" id="rQty" placeholder="Qty">
  <button onclick="receiving.push({id:rSku.value,qty:+rQty.value});save();renderAll()">Add</button>`;
  receiving.innerHTML=receivingDiv;
}

function renderSales(){
  salesDiv=`<h3>Sales / Data</h3>
  <select id="sSku">${skus.map(s=>`<option>${s.id}</option>`).join("")}</select>
  <input type="number" id="sQty" placeholder="Qty">
  <button onclick="sales.push({id:sSku.value,qty:+sQty.value});save();renderAll()">Add</button>`;
  sales.innerHTML=salesDiv;
}

function renderPhysical(){
  physical.innerHTML=`<h3>Physical Count</h3>
  <table>
  <tr><th>ID</th><th>System</th><th>Physical</th><th>Variance</th></tr>
  ${skus.map(s=>{
    const sys=stockFor(s.id);
    return `<tr>
      <td>${s.id}</td>
      <td>${sys}</td>
      <td><input type="number" onchange="
        this.parentElement.nextElementSibling.innerText=this.value-${sys};
        this.parentElement.parentElement.className=
          (this.value-${sys})!==0?'critical':'';
      "></td>
      <td>0</td></tr>`;
  }).join("")}
  </table>`;
}

function renderAll(){
  renderStock();
  renderReceiving();
  renderSales();
  renderPhysical();
}

function showPage(id){
  ["stock","receiving","sales","physical","admin"].forEach(p=>{
    document.getElementById(p).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
``

</body>
</html>
