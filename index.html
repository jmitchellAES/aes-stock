<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AES Inventory System</title>

<!-- MSAL -->
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:40px;
}
button {
  padding:10px 16px;
  font-size:15px;
  cursor:pointer;
}
.hidden { display:none; }
.card {
  background:#fff;
  padding:24px;
  max-width:520px;
  margin:40px auto;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
#error { color:#b91c1c; margin-top:12px; }
nav button { margin-right:6px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="card">
  <h2>AES Inventory System</h2>
  <button id="btnLogin">Sign in with Microsoft</button>
  <div id="error"></div>
</div>

<!-- APP -->
<div id="appView" class="card hidden">
  <h3>✅ Login Successful</h3>
  <p id="whoEmail"></p>
  <nav>
    <button>Inventory</button>
    <button>Transfers</button>
    <button>Data</button>
  </nav>
</div>

<script>
/* ================= AUTH ================= */
const msalApp = new msal.PublicClientApplication({
  auth: {
    clientId: "c7c97eaf-1e41-4339-93c5-555b6c8bf231",
    authority: "https://login.microsoftonline.com/1d0cc9c5-af28-42e4-b83c-677cb00c9dde",
    redirectUri: "https://jmitchellaes.github.io/aes-stock/"
  },
  cache: { cacheLocation: "localStorage" }
});

const ALLOWED_USERS = [
  "jmitchell@allelectricsales.com",
  "jmarra@allelectricsales.com"
];

document.getElementById("btnLogin").onclick = async () => {
  error.innerText = "";
  try {
    const res = await msalApp.loginPopup({
      scopes: ["User.Read"],
      prompt: "select_account"
    });

    const email = res.account.username.toLowerCase();
    if (!ALLOWED_USERS.includes(email)) {
      await msalApp.logoutPopup();
      throw new Error("Access denied: " + email);
    }

    loginView.classList.add("hidden");
    appView.classList.remove("hidden");
    whoEmail.innerText = email;

  } catch (err) {
    console.error(err);
    error.innerText = err.errorCode || err.message || "Login failed";
  }
};
</script>

</body>
</html>
